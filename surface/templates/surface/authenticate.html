{% extends 'surface/surface.html' %}
{% block content %}
<div class="container-mid mx-auto hover-box text-cg p-4 rounded shadow-lg">
    {% if display %}
    <h1 class="text-surface">SignUp Here</h1>
    <hr>
    <form action="/signup" method="post">
        {% csrf_token %}
        <div class="form-group py-2">
            <label for="username">Username</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Choose a unique username"
                required>
        </div>
        <div class="form-group py-2">
            <label for="fname">First Name</label>
            <input type="text" class="form-control" id="fname" name="fname" placeholder="Enter Your First Name"
                required>
        </div>
        <div class="form-group py-2">
            <label for="lname">Last Name</label>
            <input type="text" class="form-control" id="lname" name="lname" placeholder="Enter Your Last Name" required>
        </div>
        <div class="form-group py-2">
            <label for="email">Email address</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
        </div>
        <div class="form-group py-2">
            <label for="pass1">Choose a password</label>
            <input type="password" class="form-control" id="pass1" name="pass1" placeholder="Choose Your Password"
                required>
        </div>
        <div class="form-group py-2">
            <label for="pass2">Confirm Password</label>
            <input type="password" class="form-control" id="pass2" name="pass2" placeholder="Enter your password again"
                required>
        </div>
        <br>
        <button type="submit" class="btn btn-outline-success current">Submit</button>
    </form>
    {% else %}
    <h1 class="text-surface">Login Here</h1>
    <hr>
    <form action="/login" method="POST"> {% csrf_token %}
        <div class="form-group py-2">
            <label for="username">Username</label>
            <input type="text" class="form-control" id="loginusername" name="loginusername"
                placeholder="Enter your username " required>
        </div>
        <div class="form-group py-2">
            <label for="pass">Enter your password </label>
            <input type="password" class="form-control" id="loginpassword" name="loginpassword"
                placeholder="Enter your password " required>
        </div>
        <br>
        <button type="submit" class="btn btn-outline-success current">Submit</button>
    </form>
    {% endif %}
</div>
{% endblock content %}
